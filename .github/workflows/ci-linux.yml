name: CI — Linux

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-gcc:
    name: GCC ${{ matrix.gcc }} / ${{ matrix.build_type }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        gcc: ["12", "13"]
        build_type: [Debug, Release]

    steps:
      - uses: actions/checkout@v4

      - name: Install GCC ${{ matrix.gcc }}
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-${{ matrix.gcc }} g++-${{ matrix.gcc }}

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_C_COMPILER=gcc-${{ matrix.gcc }} \
            -DQDB_BUILD_TESTS=ON \
            -DQDB_BUILD_EXAMPLES=ON \
            -DQDB_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  build-clang:
    name: Clang ${{ matrix.clang }} / ${{ matrix.build_type }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        clang: ["15", "16", "17"]
        build_type: [Debug, Release]

    steps:
      - uses: actions/checkout@v4

      - name: Install Clang ${{ matrix.clang }}
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | \
            sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          sudo add-apt-repository \
            "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-${{ matrix.clang }} main"
          sudo apt-get update -q
          sudo apt-get install -y clang-${{ matrix.clang }}

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_C_COMPILER=clang-${{ matrix.clang }} \
            -DQDB_BUILD_TESTS=ON \
            -DQDB_BUILD_EXAMPLES=ON \
            -DQDB_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  sanitizers:
    name: Clang / ASan + UBSan
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Clang
        run: |
          sudo apt-get update -q
          sudo apt-get install -y clang

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang \
            -DQDB_BUILD_TESTS=ON \
            -DQDB_WARNINGS_AS_ERRORS=ON \
            -DQDB_SANITIZERS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure
        env:
          ASAN_OPTIONS: halt_on_error=1:detect_leaks=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
