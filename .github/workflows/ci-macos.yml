name: CI — macOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Apple Clang / ${{ matrix.build_type }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DQDB_BUILD_TESTS=ON \
            -DQDB_BUILD_EXAMPLES=ON \
            -DQDB_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  build-homebrew-llvm:
    name: Homebrew Clang / ${{ matrix.build_type }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM
        run: brew install llvm

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_C_COMPILER="$(brew --prefix llvm)/bin/clang" \
            -DQDB_BUILD_TESTS=ON \
            -DQDB_BUILD_EXAMPLES=ON \
            -DQDB_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  sanitizers:
    name: Apple Clang / ASan + UBSan
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DQDB_BUILD_TESTS=ON \
            -DQDB_WARNINGS_AS_ERRORS=ON \
            -DQDB_SANITIZERS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure
        env:
          ASAN_OPTIONS: halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
