name: CI — Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-msvc:
    name: MSVC ${{ matrix.arch }} / ${{ matrix.build_type }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, Win32]
        build_type: [Debug, Release]

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -B build -A ${{ matrix.arch }} `
            -DQDB_BUILD_TESTS=ON `
            -DQDB_BUILD_EXAMPLES=ON `
            -DQDB_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Test
        run: ctest --test-dir build -C ${{ matrix.build_type }} --output-on-failure

  build-clang-cl:
    name: clang-cl / ${{ matrix.build_type }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -B build `
            -T ClangCL `
            -DQDB_BUILD_TESTS=ON `
            -DQDB_BUILD_EXAMPLES=ON `
            -DQDB_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Test
        run: ctest --test-dir build -C ${{ matrix.build_type }} --output-on-failure
